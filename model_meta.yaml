# Model metadata registry — read by the plotters to annotate/group panels and to
# compare boom-capture (esp. the 1960 RMSE) for best-available vs weaker siblings.
#
# Keyed by the SHORT model name (what short_model() yields: the last path segment
# of the together/... id, matching the run-folder + leaderboard names).
#
# is_best — the ONE size/quality axis we keep. True = this is the best model from
#   its provider that is available on Together; False = a deliberately-included
#   weaker/older sibling. Binary and objective — no cross-vendor "size tier"
#   guessing (a Gemma "large" 31B and a Qwen "flagship" 1T are not comparable, so
#   S/M/L/XL was arbitrary). The only False entries are the siblings we ran
#   alongside a provider's top model: gpt-oss-20b (vs 120b) and Qwen 3.6/3.7-Plus
#   (vs 3.7-Max). Providers where we ran a single model → their Together flagship.
#
# PARAMS — informational only, NOT a tier basis. params_total_b / params_active_b
#   in billions (active = per-token for MoE; = total for dense). params_confidence:
#   published (vendor/model-card figure) · estimated (undisclosed; inferred).
#
# thinking_configured — the thinking state WE ELICITED, not a model default:
#   our run's `disable_thinking` flag cross-referenced with whether the family
#   honors the /no_think switch (only Qwen does). Confounded with model identity
#   (findings-doc caveat) — read it as "how we ran it," not "what the model is."
#     on        = disable_thinking:False + a real token budget (we let it reason)
#     off       = /no_think sent AND honored (Qwen family only)
#     ambiguous = /no_think sent but ignored (non-Qwen) -> reasoned in a 512 budget
#
# cost_tier — $/$$/$$$ (Together pricing); null = not yet pulled (don't fabricate).

gpt-oss-120b:
  provider: OpenAI
  is_best: true                    # vs the smaller gpt-oss-20b we also ran
  params_total_b: 117
  params_active_b: 5.1
  moe: true
  params_confidence: published
  thinking_configured: ambiguous
  cost_tier: null
  notes: open-weight MoE (128 experts, top-4); best OpenAI model on Together

gpt-oss-20b:
  provider: OpenAI
  is_best: false                   # smaller sibling of gpt-oss-120b
