# Model metadata registry — read by the plotters to order/annotate panels and to
# compare boom-capture (esp. the 1960 RMSE) for best-available vs weaker siblings.
#
# Keyed by the SHORT model name (what short_model() yields: the last path segment
# of the together/... id, matching the run-folder + leaderboard names).
#
# cost_output_per_mtok — Together output price, $/1M tokens. The plots order model
#   panels CHEAPEST -> most expensive by this (Mattie's call). null = unknown.
#
# is_best — retained metadata (not the ordering anymore). True = the best model
#   from its provider available on Together; False = a deliberately-included
#   weaker/older sibling (gpt-oss-20b vs 120b; Qwen 3.6/3.7-Plus vs 3.7-Max).
#
# PARAMS — informational only. params_total_b / params_active_b in billions
#   (active = per-token for MoE; = total for dense). params_confidence:
#   published (vendor/model-card figure) · estimated (undisclosed; inferred).
#
# thinking_configured — the thinking state of the ORIGINAL PERIOD runs (a caveat,
#   confounded with model identity). Superseded by explicit per-model control:
#
# thinking_off / thinking_on — the EXACT `extra_body` to force reasoning off/on via
#   Together (merged into the request body by GenerateConfig(extra_body=...)).
#   Verified 2026-07-02: Qwen/Gemma/Nemotron -> chat_template_kwargs.enable_thinking;
#   GLM-5.x -> reasoning.enabled; MiniMax-M3 -> thinking.type. All default to
#   thinking ON except Gemma. gpt-oss dropped from the cohort work (no control here).

gpt-oss-120b:
  provider: OpenAI
  cost_output_per_mtok: null
  is_best: true                    # vs the smaller gpt-oss-20b we also ran
  params_total_b: 117
  params_active_b: 5.1
  moe: true
  params_confidence: published
  thinking_configured: ambiguous
  notes: open-weight MoE (128 experts, top-4); best OpenAI model on Together

gpt-oss-20b:
  provider: OpenAI
  cost_output_per_mtok: null
  is_best: false                   # smaller sibling of gpt-oss-120b
  params_total_b: 21
  params_active_b: 3.6
  moe: true
  params_confidence: published
  thinking_configured: ambiguous
  notes: open-weight MoE (32 experts, top-4); smallest in the panel

Qwen3.7-Max:
  provider: Alibaba
  cost_output_per_mtok: 3.75
  is_best: true                    # top of the Qwen ladder (Flash < Plus < Max)
  params_total_b: 1000             # Qwen3-Max confirmed 1T+ total (Sept 2025)
  params_active_b: 50              # active undisclosed; estimate
  moe: true
  params_confidence: estimated
  thinking_configured: off
  thinking_off: {chat_template_kwargs: {enable_thinking: false}}
  thinking_on: {chat_template_kwargs: {enable_thinking: true}}
  notes: proprietary 1T+ MoE flagship (Max). Version 3.7 speculative, tier stable

Qwen3.7-Plus:
  provider: Alibaba
  cost_output_per_mtok: 1.28
  is_best: false                   # Plus < Max (mid tier)
  params_total_b: 300              # undisclosed; ~200-400B MoE by price/latency analogy
  params_active_b: 20              # undisclosed; ~15-25B
  moe: true
  params_confidence: estimated
  thinking_configured: off
  thinking_off: {chat_template_kwargs: {enable_thinking: false}}
  thinking_on: {chat_template_kwargs: {enable_thinking: true}}
  notes: proprietary size; mid tier (Plus)

Qwen3.6-Plus:
  provider: Alibaba
  cost_output_per_mtok: 3.00       # priced high — vendor nudging users off the prior gen
  is_best: false                   # older gen + Plus < Max
  params_total_b: 300
  params_active_b: 20
  moe: true
  params_confidence: estimated
  thinking_configured: off
  thinking_off: {chat_template_kwargs: {enable_thinking: false}}
  thinking_on: {chat_template_kwargs: {enable_thinking: true}}
  notes: proprietary size; mid tier, prior gen. NB reads the 1960 boom best in the panel

gemma-4-31B-it:
  provider: Google
  cost_output_per_mtok: 0.97       # cheapest in the panel
  is_best: true                    # Gemma 4 flagship dense on Together
  params_total_b: 31
  params_active_b: 31              # dense -> active = total
  moe: false
  params_confidence: published
  thinking_configured: on          # period run: 1024-token budget
  thinking_off: {chat_template_kwargs: {enable_thinking: false}}
  thinking_on: {chat_template_kwargs: {enable_thinking: true}}
  notes: open-weight dense; Gemma 4 flagship dense (released 2026-03). NB Gemma 4 has a thinking mode (default off), unlike Gemma 1-3

MiniMax-M3:
  provider: MiniMax
  cost_output_per_mtok: 1.20
  is_best: true                    # MiniMax runs one flagship line
  params_total_b: 427
  params_active_b: 26
  moe: true
  params_confidence: published     # ~427B/26B (vLLM); SiliconFlow lists 428B/23B
  thinking_configured: ambiguous
  thinking_off: {thinking: {type: disabled}}   # NB degenerates to token-salad when off
  thinking_on: {thinking: {type: adaptive}}    # "enabled" is invalid -> 400
  notes: open-weight MoE flagship (released 2026-06); M3 can disable thinking (M2 could not), but output degrades badly when it does

nemotron-3-ultra-550b-a55b:
  provider: NVIDIA
  cost_output_per_mtok: 3.60
  is_best: true                    # Ultra = top of Nano < Super < Ultra
  params_total_b: 550              # NVIDIA launch language ~500B total / ~50B active
  params_active_b: 55
  moe: true
  params_confidence: estimated     # "~500B/~50B" approx until final weights publish
  thinking_configured: on          # period run: 4096-token budget
  thinking_off: {chat_template_kwargs: {enable_thinking: false}}
  thinking_on: {chat_template_kwargs: {enable_thinking: true}}
  notes: open-weight hybrid latent-MoE Ultra tier; largest total in the panel. Nemotron-3 uses the kwarg, not the gen-1 detailed-thinking system string

GLM-5.2:
  provider: Zhipu
  cost_output_per_mtok: 4.40       # most expensive in the panel
  is_best: true                    # GLM flagship (Flash < Air < full)
  params_total_b: 750              # ~744-753B across sources
  params_active_b: 40
  moe: true
  params_confidence: published
  thinking_configured: on          # period run: 4096-token budget
  thinking_off: {reasoning: {enabled: false}}
  thinking_on: {reasoning: {enabled: true}}
  notes: open-weight MoE flagship (released 2026-06); GLM-5.x uses reasoning.enabled, not the legacy enable_thinking kwarg
